<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>

  <!-- AI Brain Symbol -->
  <g transform="translate(100, 100)">
    <!-- Central Circle (Core) -->
    <circle cx="0" cy="0" r="15" fill="#4285f4" opacity="0.9"/>

    <!-- Neural Network Nodes -->
    <circle cx="-35" cy="-25" r="8" fill="#34a853" opacity="0.8"/>
    <circle cx="35" cy="-25" r="8" fill="#fbbc04" opacity="0.8"/>
    <circle cx="-40" cy="25" r="8" fill="#ea4335" opacity="0.8"/>
    <circle cx="40" cy="25" r="8" fill="#673ab7" opacity="0.8"/>

    <!-- Smaller Nodes -->
    <circle cx="-20" cy="-40" r="5" fill="#4285f4" opacity="0.6"/>
    <circle cx="20" cy="-40" r="5" fill="#34a853" opacity="0.6"/>
    <circle cx="-50" cy="0" r="5" fill="#fbbc04" opacity="0.6"/>
    <circle cx="50" cy="0" r="5" fill="#ea4335" opacity="0.6"/>

    <!-- Connection Lines -->
    <line x1="0" y1="0" x2="-35" y2="-25" stroke="#4285f4" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="35" y2="-25" stroke="#4285f4" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="-40" y2="25" stroke="#4285f4" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="40" y2="25" stroke="#4285f4" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="0" x2="-20" y2="-40" stroke="#4285f4" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="20" y2="-40" stroke="#4285f4" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="-50" y2="0" stroke="#4285f4" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="50" y2="0" stroke="#4285f4" stroke-width="1.5" opacity="0.3"/>

    <!-- Inter-node connections -->
    <line x1="-35" y1="-25" x2="35" y2="-25" stroke="#34a853" stroke-width="1" opacity="0.3"/>
    <line x1="-40" y1="25" x2="40" y2="25" stroke="#ea4335" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#333333">
    AI DEV SETUP
  </text>
</svg>
