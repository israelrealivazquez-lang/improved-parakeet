name: NEXUS Cloud Processor
on:
  push:
    paths:
      - 'data_exports/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  reconstruct_thesis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil requests
          
      - name: Process Large Logs
        run: |
          python scripts/persistent/NEXUS_GRID_ORCHESTRATOR.py --urls "https://example.com"
          # Aquí irá el comando de concatenación pesada
