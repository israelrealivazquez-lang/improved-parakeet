name: NEXUS THESIS RECONSTRUCTOR

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */12 * * *"

jobs:
  synthesize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare output
        run: |
          mkdir -p cloud-output
          echo "Cloud sync placeholder: no external credentials configured in this repo." | tee cloud-output/sync-status.txt

      - name: Execute reconstructor if available
        run: |
          if [ -f scripts/persistent/RECONSTRUCTOR_MAESTRO.js ]; then
            node scripts/persistent/RECONSTRUCTOR_MAESTRO.js || true
          else
            echo "RECONSTRUCTOR_MAESTRO.js not present; generating inventory instead." | tee cloud-output/reconstructor-status.txt
            find . -maxdepth 3 -type f | sort > cloud-output/repo-inventory.txt
          fi

      - name: Upload synthesis output
        uses: actions/upload-artifact@v4
        with:
          name: thesis-synthesis-output
          path: cloud-output/
          if-no-files-found: warn

      - name: Summary
        run: echo "Synthesis workflow completed. Artifacts uploaded when available."
