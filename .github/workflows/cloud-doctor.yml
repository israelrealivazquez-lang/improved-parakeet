name: Cloud Doctor

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "web-app/**"
      - ".devcontainer/**"
      - "scripts/cloud-doctor.sh"
      - ".github/workflows/cloud-doctor.yml"
  pull_request:
    paths:
      - "web-app/**"
      - ".devcontainer/**"
      - "scripts/cloud-doctor.sh"
      - ".github/workflows/cloud-doctor.yml"

jobs:
  doctor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run cloud doctor
        run: bash scripts/cloud-doctor.sh
